name: Atualizar dados dos ETFs

on:
  schedule:
    # Dias úteis às 06:30 UTC (~03:30 BRT) — após o fechamento das bolsas europeias do dia anterior
    - cron: "30 6 * * 1-5"
  workflow_dispatch:        # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Resolver símbolos que ainda faltam (incremental, com cache)
        run: python scripts/resolve_symbols.py
        working-directory: .

      - name: Atualizar dados e indicadores
        env:
          HISTORY_PERIOD: "2y"
        run: python scripts/update_data.py

      - name: Commit dos dados atualizados
        run: |
          git config user.name  "convest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/symbol_map.csv data/prices.csv.gz docs/data/latest.json
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos dados."
          else
            git commit -m "chore: atualização automática de dados $(date -u +%Y-%m-%d)"
            git push
          fi
